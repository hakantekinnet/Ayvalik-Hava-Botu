name: Ayvalik Hava Durumu Botu

on:
  schedule:
    # GitHub UTC saat dilimini kullanır. 
    # Türkiye saati (UTC+3) ile sabah 08:00'de çalışması için buraya 05:00 yazıyoruz.
    - cron: '0 5 * * *'
  workflow_dispatch: # Bu satır, sistemi istediğin zaman manuel olarak tetikleyebilmeni sağlar.

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run Bot
      env:
        API_KEY: ${{ secrets.API_KEY }}
        TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      run: python bot.py
